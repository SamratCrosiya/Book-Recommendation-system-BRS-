<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BookLens — Top 50 Books</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: #0f0f13;
      color: #e8e8f0;
      min-height: 100vh;
    }

    /* ── Navbar ── */
    .navbar {
      position: sticky; top: 0; z-index: 100;
      background: rgba(20, 10, 40, 0.85);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(168, 85, 247, 0.2);
      padding: 0 2rem;
      height: 60px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .nav-brand {
      font-size: 18px; font-weight: 600;
      color: #fff;
      display: flex; align-items: center; gap: 8px;
    }
    .nav-links { display: flex; gap: 2rem; list-style: none; }
    .nav-links a {
      color: rgba(255,255,255,0.6);
      text-decoration: none; font-size: 14px;
      transition: color 0.2s;
    }
    .nav-links a:hover, .nav-links a.active { color: #c084fc; }

    /* ── Hero ── */
    .hero {
      background: linear-gradient(135deg, #1a0a2e 0%, #16213e 100%);
      padding: 3.5rem 2rem 2.5rem;
      border-bottom: 1px solid rgba(168, 85, 247, 0.15);
    }
    .badge {
      display: inline-block;
      background: rgba(168,85,247,0.15);
      color: #c084fc;
      border: 1px solid rgba(168,85,247,0.3);
      border-radius: 20px;
      font-size: 12px; font-weight: 500;
      padding: 4px 14px; margin-bottom: 14px;
      letter-spacing: 0.5px; text-transform: uppercase;
    }
    .hero h1 { font-size: 42px; font-weight: 600; color: #fff; margin-bottom: 8px; }
    .hero p  { color: rgba(255,255,255,0.45); font-size: 15px; }

    /* ── Grid ── */
    .books-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
      gap: 20px;
      padding: 2.5rem 2rem;
      max-width: 1400px;
      margin: 0 auto;
    }

    /* ── Card ── */
    .book-card {
      background: #1a1a26;
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 14px;
      overflow: hidden;
      transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
    }
    .book-card:hover {
      transform: translateY(-4px);
      border-color: rgba(168,85,247,0.4);
      box-shadow: 0 12px 32px rgba(108, 61, 224, 0.2);
    }
    .card-img-wrap {
      width: 100%; height: 230px; overflow: hidden;
      background: linear-gradient(135deg, #2d1b4e, #1e3a5f);
    }
    .card-img-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .card-body { padding: 14px; }
    .card-title {
      font-size: 13px; font-weight: 500; color: #e8e8f0;
      margin-bottom: 4px; line-height: 1.4;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .card-author {
      font-size: 12px; color: rgba(255,255,255,0.4);
      margin-bottom: 10px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .card-meta {
      display: flex; justify-content: space-between; align-items: center;
      padding-top: 10px;
      border-top: 1px solid rgba(255,255,255,0.06);
    }
    .rating { display: flex; align-items: center; gap: 4px; font-size: 12px; color: #f59e0b; font-weight: 500; }
    .votes { font-size: 11px; color: rgba(255,255,255,0.3); }

    /* ── Footer ── */
    footer {
      text-align: center; padding: 2rem;
      color: rgba(255,255,255,0.2); font-size: 12px;
      border-top: 1px solid rgba(255,255,255,0.05);
    }
  </style>
</head>
<body>

  <nav class="navbar">
    <div class="nav-brand">📚 BookLens</div>
    <ul class="nav-links">
      <li><a href="/" class="active">Home</a></li>
      <li><a href="/recommend">Recommend</a></li>
      <li><a href="#">About</a></li>
    </ul>
  </nav>

  <div class="hero">
    <div class="badge">Curated Collection</div>
    <h1>Top 50 Books</h1>
    <p>Ranked by community votes &amp; ratings</p>
  </div>

  <div class="books-grid">
    {% for i in range(book_name|length) %}
    <div class="book-card">
      <div class="card-img-wrap">
        <img src="{{ image[i] }}" alt="{{ book_name[i] }}" loading="lazy">
      </div>
      <div class="card-body">
        <div class="card-title" title="{{ book_name[i] }}">{{ book_name[i] }}</div>
        <div class="card-author">{{ author[i] }}</div>
        <div class="card-meta">
          <span class="rating">★ {{ rating[i] }}</span>
          <span class="votes">{{ votes[i] }} votes</span>
        </div>
      </div>
    </div>
    {% endfor %}
  </div>

  <footer>© 2025 BookLens · Built with Flask</footer>

</body>
</html>
